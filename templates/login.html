{% load static %}
<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login — GestImóveis</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <link rel="stylesheet" href="{% static 'css/custom.css' %}">
</head>
<body class="login-page">

  <div class="login-card">
    <div class="login-logo">
      <i class="bi bi-buildings-fill fs-1" style="color: #1a3a5c"></i>
      <h4>GestImóveis</h4>
      <small>Sistema de Gestão Imobiliária</small>
    </div>

    {% if form.errors %}
    <div class="alert alert-danger small py-2">
      <i class="bi bi-exclamation-triangle me-1"></i>
      Usuário ou senha inválidos. Tente novamente.
    </div>
    {% endif %}

    <form method="post" novalidate>
      {% csrf_token %}
      <input type="hidden" name="next" value="{{ next }}">

      <div class="mb-3">
        <label class="form-label" for="id_username">
          <i class="bi bi-person me-1"></i>Usuário
        </label>
        <input
          type="text"
          name="username"
          id="id_username"
          class="form-control"
          placeholder="Digite seu usuário"
          autofocus
          required
        >
      </div>

      <div class="mb-4">
        <label class="form-label" for="id_password">
          <i class="bi bi-lock me-1"></i>Senha
        </label>
        <input
          type="password"
          name="password"
          id="id_password"
          class="form-control"
          placeholder="Digite sua senha"
          required
        >
      </div>

      <button type="submit" class="btn btn-primary w-100">
        <i class="bi bi-box-arrow-in-right me-1"></i> Entrar
      </button>
    </form>

    <p class="text-center text-muted mt-4 mb-0" style="font-size:.78rem">
      &copy; {% now "Y" %} GestImóveis &mdash; Acesso restrito a funcionários autorizados
    </p>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
